<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilmLog | 당신의 시선을 기록하세요</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body>
    <div id="header"></div>

    <main>
      <section class="hero hero--immersive">
        <div class="hero__bg">
          <video
            id="hero-video"
            src="video/hero-bg.mp4"
            autoplay
            muted
            loop
            playsinline
            style="width: 100%; height: 100%; object-fit: cover"
          ></video>
        </div>
        <div class="grain-overlay"></div>
        <div class="date-stamp" id="currentDate">26' 03 12</div>

        <div class="container hero__content">
          <h1 class="hero__title">필름으로 담고,<br />FilmLog로 기록하다</h1>
          <p class="hero__subtitle">
            당신의 가장 찬란한 순간들이 아날로그의 영혼을 담아 디지털로
            기록됩니다.
          </p>
          <div class="hero__actions" style="display: flex; justify-content: center;">
            <a href="camera-selection.html" class="btn btn--primary" style="font-size: 1.1rem"
              >촬영 시작하기</a
            >
          </div>
        </div>
      </section>
    </main>

    <script>
      // Simulation state
      const isLoggedIn = localStorage.getItem("filmlog_logged_in") === "true";

      function updateHeroState() {
        if (localStorage.getItem("filmlog_logged_in") === null) {
          localStorage.setItem("filmlog_logged_in", "true");
          localStorage.setItem("filmlog_active_roll", "true");
        }
      }

      window.addEventListener("load", updateHeroState);
    </script>

    <div id="footer"></div>

    <script src="js/include.js"></script>
  </body>
</html>
